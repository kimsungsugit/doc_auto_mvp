name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check app/

      - name: Test (pytest)
        # OPENAI_API_KEY 없어서 tests/test_ai_e2e.py 6건은 skip.
        # Secrets에 OPENAI_API_KEY를 설정하면 E2E까지 실행됨.
        env:
          OPENAI_STRUCTURING_ENABLED: ${{ secrets.OPENAI_API_KEY && 'true' || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/ -v --tb=short
